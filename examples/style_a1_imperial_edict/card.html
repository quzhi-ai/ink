<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 390px; height: 520px; overflow: hidden; }
</style>
</head>
<body>
<div style="font-family: 'STKaiti', 'KaiTi', 'Songti SC', serif; max-width: 420px; margin: 0 auto; position: relative;">
  <h2 class="sr-only">圣旨风格 AI 对话统计卡片</h2>
  <!-- 卷轴上轴 -->
  <div style="height: 24px; background: linear-gradient(180deg, #8B6914 0%, #e6c54e 25%, #c8a84e 50%, #e6c54e 75%, #8B6914 100%); border-radius: 12px; position: relative; z-index: 2; box-shadow: 0 4px 8px rgba(0,0,0,0.3);"></div>

  <!-- 圣旨正文 -->
  <div style="background: linear-gradient(180deg, #f5e6b8 0%, #f9edc7 20%, #f5e6b8 40%, #f0dca8 60%, #f5e6b8 80%, #f0dca8 100%); margin: 0 14px; padding: 36px 28px; position: relative; box-shadow: inset 2px 0 6px rgba(139,105,20,0.2), inset -2px 0 6px rgba(139,105,20,0.2);">

    <!-- 龙纹底纹 (简化) -->
    <div style="position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 100px; height: 40px; border: 2px solid rgba(200,168,78,0.12); border-radius: 50%; opacity: 0.5;"></div>

    <div style="position: relative; z-index: 1;">
      <!-- 奉天承运 -->
      <div style="text-align: center; margin-bottom: 24px;">
        <div style="font-size: 24px; font-weight: 700; color: #8B6914; letter-spacing: 8px; margin-bottom: 8px;">奉 天 承 运</div>
        <div style="font-size: 16px; color: #6a5530; letter-spacing: 6px;">皇帝诏曰</div>
      </div>

      <!-- 正文 -->
      <div style="font-size: 16px; color: #3a2810; line-height: 2.4; letter-spacing: 2px; text-indent: 2em; margin-bottom: 20px;">
        朕闻天下有人名曲直者，居深圳，日与机器论道不辍。今查其第廿六周之对话，竟达<span style="font-size: 22px; font-weight: 700; color: #c23a2b;">七百一十三</span>轮之多。
      </div>

      <div style="font-size: 16px; color: #3a2810; line-height: 2.4; letter-spacing: 2px; text-indent: 2em; margin-bottom: 20px;">
        其中飞书教练<span style="font-weight: 700;">三百五十五</span>轮，编程之术<span style="font-weight: 700;">二百九十三</span>轮，桌面对谈<span style="font-weight: 700;">六十五</span>轮。日均逾百，峰值周一一百六十六轮，每至亥时犹与机器彻谈。
      </div>

      <div style="font-size: 16px; color: #3a2810; line-height: 2.4; letter-spacing: 2px; text-indent: 2em; margin-bottom: 24px;">
        朕甚嘉之。特封为<span style="font-size: 18px; font-weight: 700; color: #c23a2b;">「人机对话一等公」</span>，赐号<span style="font-weight: 700;">「深夜论道侯」</span>。望卿再接再厉，勿负朕望。
      </div>

      <!-- 金句 -->
      <div style="text-align: center; margin-bottom: 20px; padding: 12px 0; border-top: 1px solid rgba(200,168,78,0.2); border-bottom: 1px solid rgba(200,168,78,0.2);">
        <div style="font-size: 15px; color: #6a5530; line-height: 2; letter-spacing: 2px;">
          「知之为知之，不知为不知，<br/>不知则问 AI —— 是知也。」
        </div>
        <div style="font-size: 11px; color: #a08850; margin-top: 4px;">—— 孔子 · 御批改编</div>
      </div>

      <!-- 钦此 -->
      <div style="text-align: center; margin-bottom: 12px;">
        <div style="font-size: 20px; font-weight: 700; color: #c23a2b; letter-spacing: 8px;">钦 此</div>
      </div>

      <!-- 日期 + 御玺 -->
      <div style="display: flex; justify-content: space-between; align-items: flex-end;">
        <div style="font-size: 12px; color: #a08850; letter-spacing: 1px;">
          二〇二六年六月二十六日
        </div>
        <div style="width: 56px; height: 56px; border: 3px solid rgba(194,58,43,0.4); border-radius: 4px; display: flex; align-items: center; justify-content: center; transform: rotate(-8deg);">
          <div style="text-align: center; writing-mode: vertical-rl;">
            <span style="font-size: 14px; color: rgba(194,58,43,0.5); font-weight: 700; letter-spacing: 4px;">御玺</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 卷轴下轴 -->
  <div style="height: 24px; background: linear-gradient(180deg, #8B6914 0%, #e6c54e 25%, #c8a84e 50%, #e6c54e 75%, #8B6914 100%); border-radius: 12px; position: relative; z-index: 2; box-shadow: 0 -4px 8px rgba(0,0,0,0.3);"></div>
</div>
</body>
</html>
