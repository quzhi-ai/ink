<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 390px; height: 520px; overflow: hidden; }
</style>
</head>
<body>
<div style="font-family: 'STKaiti', 'KaiTi', 'Songti SC', serif; max-width: 400px; margin: 0 auto; position: relative;">
  <h2 class="sr-only">科举金榜风格 AI 对话统计卡片</h2>

  <!-- 金榜 -->
  <div style="background: linear-gradient(180deg, #fbe9a0 0%, #f5d559 10%, #f5d559 90%, #fbe9a0 100%); border: 4px double #b8860b; border-radius: 4px; padding: 0; position: relative; box-shadow: 0 4px 20px rgba(184,134,11,0.3);">

    <!-- 顶部龙纹装饰带 -->
    <div style="background: #c9960c; padding: 6px; text-align: center; border-bottom: 2px solid #b8860b;">
      <div style="font-size: 10px; color: #fff; letter-spacing: 8px;">龍 ★ 鳳 ★ 呈 ★ 祥</div>
    </div>

    <div style="padding: 28px 24px;">
      <!-- 皇 榜 -->
      <div style="text-align: center; margin-bottom: 24px;">
        <div style="font-size: 36px; font-weight: 900; color: #8B0000; letter-spacing: 16px; text-shadow: 1px 1px 2px rgba(139,0,0,0.2);">皇 榜</div>
        <div style="font-size: 11px; color: #8B6914; letter-spacing: 4px; margin-top: 4px;">丙午年第廿六周殿试</div>
      </div>

      <!-- 甲科 -->
      <div style="text-align: center; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid rgba(184,134,11,0.3);">
        <div style="font-size: 12px; color: #8B6914; margin-bottom: 8px; letter-spacing: 4px;">钦点甲科第一名</div>
        <div style="font-size: 28px; font-weight: 900; color: #8B0000; letter-spacing: 8px; margin-bottom: 4px;">状 元</div>
        <div style="font-size: 22px; font-weight: 700; color: #333; letter-spacing: 6px; margin-bottom: 8px;">曲 直</div>
        <div style="display: inline-block; background: #8B0000; color: #f5d559; padding: 4px 16px; border-radius: 2px; font-size: 12px; letter-spacing: 2px;">
          七百一十三轮 · 当朝第一
        </div>
      </div>

      <!-- 三甲分项 -->
      <div style="margin-bottom: 20px;">
        <div style="font-size: 11px; color: #8B6914; letter-spacing: 2px; margin-bottom: 10px; text-align: center;">殿试三科成绩</div>

        <div style="display: flex; gap: 8px; text-align: center;">
          <div style="flex: 1; background: rgba(139,0,0,0.06); border: 1px solid rgba(184,134,11,0.2); border-radius: 4px; padding: 10px 6px;">
            <div style="font-size: 10px; color: #8B6914;">第一科</div>
            <div style="font-size: 10px; color: #666; margin-bottom: 4px;">飞书论道</div>
            <div style="font-size: 24px; font-weight: 800; color: #8B0000;">355</div>
          </div>
          <div style="flex: 1; background: rgba(139,0,0,0.06); border: 1px solid rgba(184,134,11,0.2); border-radius: 4px; padding: 10px 6px;">
            <div style="font-size: 10px; color: #8B6914;">第二科</div>
            <div style="font-size: 10px; color: #666; margin-bottom: 4px;">编程策论</div>
            <div style="font-size: 24px; font-weight: 800; color: #8B0000;">293</div>
          </div>
          <div style="flex: 1; background: rgba(139,0,0,0.06); border: 1px solid rgba(184,134,11,0.2); border-radius: 4px; padding: 10px 6px;">
            <div style="font-size: 10px; color: #8B6914;">第三科</div>
            <div style="font-size: 10px; color: #666; margin-bottom: 4px;">桌面对谈</div>
            <div style="font-size: 24px; font-weight: 800; color: #8B0000;">65</div>
          </div>
        </div>
      </div>

      <!-- 考官评语 -->
      <div style="background: rgba(139,0,0,0.04); border: 1px solid rgba(184,134,11,0.2); border-radius: 4px; padding: 12px; margin-bottom: 16px;">
        <div style="font-size: 10px; color: #8B6914; margin-bottom: 4px;">主考官批语</div>
        <div style="font-size: 12px; color: #555; line-height: 2; letter-spacing: 1px;">
          日均过百，峰值一百六十六，亥时犹论道不辍。此生勤勉可嘉，才思敏捷，堪当大用。
        </div>
      </div>

      <!-- 金句 -->
      <div style="text-align: center; padding-top: 8px;">
        <div style="font-size: 12px; color: #8B6914; line-height: 1.8; letter-spacing: 1px;">
          「学而不厌，诲人不倦。<br/>问 AI 不倦，亦学也。」
        </div>
        <div style="font-size: 10px; color: #b8860b; margin-top: 4px;">—— 论语 · 御批改编</div>
      </div>
    </div>

    <!-- 底部装饰 -->
    <div style="background: #c9960c; padding: 6px; text-align: center; border-top: 2px solid #b8860b;">
      <div style="font-size: 9px; color: #fff; letter-spacing: 4px;">天子门生 · 光耀门楣</div>
    </div>
  </div>
</div>
</body>
</html>
