<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 390px; height: 520px; overflow: hidden; }
</style>
</head>
<body>
<div style="font-family: 'Songti SC', 'Noto Serif SC', Georgia, serif; max-width: 360px; margin: 0 auto; background: #f8f4ea; border-radius: 4px; padding: 40px 32px; position: relative; border: 1px solid #d4c8a0; box-shadow: 0 2px 8px rgba(0,0,0,0.06);">
  <h2 class="sr-only">酒标风格 AI 对话统计卡片</h2>

  <!-- 顶部装饰线 -->
  <div style="text-align: center; margin-bottom: 20px;">
    <div style="display: inline-block; border-top: 1px solid #8a7040; border-bottom: 1px solid #8a7040; padding: 4px 24px;">
      <span style="font-size: 9px; color: #8a7040; letter-spacing: 6px;">GRAND CRU CLASSÉ</span>
    </div>
  </div>

  <!-- 年份 -->
  <div style="text-align: center; margin-bottom: 6px;">
    <div style="font-size: 56px; font-weight: 300; color: #2c1810; line-height: 1; font-family: 'Didot', 'Bodoni MT', Georgia, serif; letter-spacing: 4px;">2026</div>
  </div>

  <!-- 酒名 -->
  <div style="text-align: center; margin-bottom: 20px;">
    <div style="font-size: 26px; font-weight: 700; color: #4a1a2e; letter-spacing: 4px; line-height: 1.3;">人 机 对 话</div>
    <div style="font-size: 12px; color: #8a7040; margin-top: 4px; letter-spacing: 2px;">DIALOGUE HOMME-MACHINE</div>
  </div>

  <!-- 装饰分割 -->
  <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px;">
    <div style="flex: 1; height: 1px; background: linear-gradient(90deg, transparent, #c8b078, transparent);"></div>
    <div style="font-size: 14px; color: #c8b078;">✦</div>
    <div style="flex: 1; height: 1px; background: linear-gradient(90deg, transparent, #c8b078, transparent);"></div>
  </div>

  <!-- 庄园信息 -->
  <div style="text-align: center; margin-bottom: 24px;">
    <div style="font-size: 14px; color: #4a1a2e; font-weight: 600; letter-spacing: 2px;">曲直庄园</div>
    <div style="font-size: 10px; color: #a08850; margin-top: 4px; letter-spacing: 1px;">DOMAINE DE QUZHI · 深圳</div>
  </div>

  <!-- 品鉴笔记 -->
  <div style="border-top: 1px solid #d4c8a0; border-bottom: 1px solid #d4c8a0; padding: 16px 0; margin-bottom: 20px;">
    <div style="font-size: 10px; color: #a08850; letter-spacing: 2px; margin-bottom: 10px; text-align: center;">品 鉴 笔 记</div>
    <div style="font-size: 12px; color: #4a3520; line-height: 1.9; text-align: center;">
      此酿取自第廿六周七日之精华<br/>
      共计 <span style="font-size: 18px; font-weight: 700; color: #4a1a2e;">713</span> 轮对话<br/>
      口感层次丰富 · 日均 102 轮
    </div>
  </div>

  <!-- 葡萄品种 = 来源 -->
  <div style="margin-bottom: 20px;">
    <div style="font-size: 10px; color: #a08850; letter-spacing: 2px; margin-bottom: 10px; text-align: center;">调 配 比 例</div>
    <div style="display: flex; gap: 4px; height: 16px; border-radius: 8px; overflow: hidden; margin-bottom: 8px;">
      <div style="flex: 355; background: #4a1a2e;"></div>
      <div style="flex: 293; background: #8a3050;"></div>
      <div style="flex: 65; background: #c8789a;"></div>
    </div>
    <div style="display: flex; justify-content: space-between; font-size: 10px; color: #6a5530;">
      <span>飞书 49.8%</span>
      <span>Codex 41.1%</span>
      <span>Claude 9.1%</span>
    </div>
  </div>

  <!-- 年份特征 -->
  <div style="margin-bottom: 20px;">
    <div style="font-size: 10px; color: #a08850; letter-spacing: 2px; margin-bottom: 10px; text-align: center;">年 份 特 征</div>
    <div style="display: flex; justify-content: space-between; font-size: 11px; color: #4a3520; padding: 0 8px;">
      <div style="text-align: center;">
        <div style="font-size: 18px; font-weight: 700; color: #4a1a2e;">166</div>
        <div style="font-size: 9px; color: #a08850;">峰值日</div>
        <div style="font-size: 9px; color: #a08850;">周一</div>
      </div>
      <div style="text-align: center;">
        <div style="font-size: 18px; font-weight: 700; color: #4a1a2e;">22h</div>
        <div style="font-size: 9px; color: #a08850;">最佳</div>
        <div style="font-size: 9px; color: #a08850;">品鉴时刻</div>
      </div>
      <div style="text-align: center;">
        <div style="font-size: 18px; font-weight: 700; color: #4a1a2e;">7日</div>
        <div style="font-size: 9px; color: #a08850;">窖藏</div>
        <div style="font-size: 9px; color: #a08850;">周期</div>
      </div>
    </div>
  </div>

  <!-- 金句 -->
  <div style="text-align: center; border-top: 1px solid #d4c8a0; padding-top: 16px;">
    <div style="font-size: 13px; color: #4a3520; line-height: 1.7; font-style: italic;">
      「人生太短，不能只喝廉价的酒，<br/>也不能只问廉价的问题。」
    </div>
    <div style="font-size: 10px; color: #a08850; margin-top: 6px;">—— 某位品鉴师</div>
  </div>

  <!-- 容量 -->
  <div style="text-align: center; margin-top: 16px;">
    <span style="font-size: 9px; color: #c8b078; letter-spacing: 2px;">713 cl · 产自深圳 · 限量一瓶</span>
  </div>
</div>
</body>
</html>
