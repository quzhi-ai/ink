<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 390px; height: 520px; overflow: hidden; }
</style>
</head>
<body>
<div style="font-family: -apple-system, 'SF Pro Display', 'PingFang SC', sans-serif; max-width: 480px; margin: 0 auto; background: #fff; border-radius: 12px; overflow: hidden; border: 1px solid #e0e0e0; padding: 24px;">
  <h2 class="sr-only">地铁线路图风格 AI 对话统计卡片</h2>

  <!-- 标题 -->
  <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px;">
    <div>
      <div style="font-size: 20px; font-weight: 800; color: #1a1a1a; letter-spacing: 2px;">人机交通图</div>
      <div style="font-size: 11px; color: #999; margin-top: 2px;">曲直 · 第26周 · 2026.06.20 – 06.26</div>
    </div>
    <div style="background: #1a1a1a; color: #fff; font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 4px;">
      全网 713 班次
    </div>
  </div>

  <!-- 线路图 -->
  <svg viewBox="0 0 440 280" width="100%" style="display: block; margin-bottom: 16px;">
    <!-- 飞书线 (蓝) -->
    <line x1="30" y1="60" x2="410" y2="60" stroke="#2563eb" stroke-width="6" stroke-linecap="round"/>
    <!-- 站点 -->
    <circle cx="30" cy="60" r="8" fill="#fff" stroke="#2563eb" stroke-width="3"/>
    <circle cx="90" cy="60" r="8" fill="#fff" stroke="#2563eb" stroke-width="3"/>
    <circle cx="150" cy="60" r="8" fill="#fff" stroke="#2563eb" stroke-width="3"/>
    <circle cx="210" cy="60" r="12" fill="#2563eb" stroke="#fff" stroke-width="2"/>
    <circle cx="270" cy="60" r="8" fill="#fff" stroke="#2563eb" stroke-width="3"/>
    <circle cx="330" cy="60" r="8" fill="#fff" stroke="#2563eb" stroke-width="3"/>
    <circle cx="390" cy="60" r="6" fill="#fff" stroke="#2563eb" stroke-width="2" stroke-dasharray="2,2"/>
    <!-- 站名 -->
    <text x="30" y="45" text-anchor="middle" fill="#2563eb" font-size="9" font-weight="600">81</text>
    <text x="90" y="45" text-anchor="middle" fill="#2563eb" font-size="9" font-weight="600">69</text>
    <text x="150" y="45" text-anchor="middle" fill="#2563eb" font-size="9" font-weight="600">62</text>
    <text x="210" y="45" text-anchor="middle" fill="#2563eb" font-size="10" font-weight="800">65</text>
    <text x="270" y="45" text-anchor="middle" fill="#2563eb" font-size="9" font-weight="600">29</text>
    <text x="330" y="45" text-anchor="middle" fill="#2563eb" font-size="9" font-weight="600">30</text>
    <text x="390" y="45" text-anchor="middle" fill="#aaa" font-size="8">19</text>
    <!-- 线路牌 -->
    <rect x="0" y="72" width="36" height="14" rx="3" fill="#2563eb"/>
    <text x="18" y="82" text-anchor="middle" fill="#fff" font-size="8" font-weight="700">飞书线</text>

    <!-- Codex线 (紫) -->
    <line x1="30" y1="140" x2="410" y2="140" stroke="#7c3aed" stroke-width="6" stroke-linecap="round"/>
    <circle cx="30" cy="140" r="8" fill="#fff" stroke="#7c3aed" stroke-width="3"/>
    <circle cx="90" cy="140" r="8" fill="#fff" stroke="#7c3aed" stroke-width="3"/>
    <circle cx="150" cy="140" r="8" fill="#fff" stroke="#7c3aed" stroke-width="3"/>
    <circle cx="210" cy="140" r="8" fill="#fff" stroke="#7c3aed" stroke-width="3"/>
    <circle cx="270" cy="140" r="12" fill="#7c3aed" stroke="#fff" stroke-width="2"/>
    <circle cx="330" cy="140" r="8" fill="#fff" stroke="#7c3aed" stroke-width="3"/>
    <circle cx="390" cy="140" r="6" fill="#fff" stroke="#7c3aed" stroke-width="2" stroke-dasharray="2,2"/>
    <text x="30" y="125" text-anchor="middle" fill="#7c3aed" font-size="9" font-weight="600">10</text>
    <text x="90" y="125" text-anchor="middle" fill="#7c3aed" font-size="9" font-weight="600">40</text>
    <text x="150" y="125" text-anchor="middle" fill="#7c3aed" font-size="9" font-weight="600">35</text>
    <text x="210" y="125" text-anchor="middle" fill="#7c3aed" font-size="9" font-weight="600">62</text>
    <text x="270" y="125" text-anchor="middle" fill="#7c3aed" font-size="10" font-weight="800">96</text>
    <text x="330" y="125" text-anchor="middle" fill="#7c3aed" font-size="9" font-weight="600">30</text>
    <text x="390" y="125" text-anchor="middle" fill="#aaa" font-size="8">20</text>
    <rect x="0" y="152" width="44" height="14" rx="3" fill="#7c3aed"/>
    <text x="22" y="162" text-anchor="middle" fill="#fff" font-size="8" font-weight="700">Codex线</text>

    <!-- Claude线 (青) -->
    <line x1="210" y1="220" x2="410" y2="220" stroke="#0891b2" stroke-width="6" stroke-linecap="round"/>
    <line x1="150" y1="220" x2="210" y2="220" stroke="#0891b2" stroke-width="6" stroke-linecap="round" stroke-dasharray="4,6"/>
    <circle cx="210" cy="220" r="8" fill="#fff" stroke="#0891b2" stroke-width="3"/>
    <circle cx="270" cy="220" r="8" fill="#fff" stroke="#0891b2" stroke-width="3"/>
    <circle cx="330" cy="220" r="8" fill="#fff" stroke="#0891b2" stroke-width="3"/>
    <circle cx="390" cy="220" r="6" fill="#fff" stroke="#0891b2" stroke-width="2" stroke-dasharray="2,2"/>
    <text x="210" y="205" text-anchor="middle" fill="#0891b2" font-size="9" font-weight="600">39</text>
    <text x="270" y="205" text-anchor="middle" fill="#0891b2" font-size="9" font-weight="600">8</text>
    <text x="330" y="205" text-anchor="middle" fill="#0891b2" font-size="9" font-weight="600">18</text>
    <text x="390" y="205" text-anchor="middle" fill="#aaa" font-size="8">0</text>
    <text x="165" y="215" text-anchor="middle" fill="#aaa" font-size="7">6/23开通</text>
    <rect x="0" y="232" width="50" height="14" rx="3" fill="#0891b2"/>
    <text x="25" y="242" text-anchor="middle" fill="#fff" font-size="8" font-weight="700">Claude线</text>

    <!-- 换乘站竖线 -->
    <line x1="210" y1="60" x2="210" y2="220" stroke="#ddd" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="270" y1="60" x2="270" y2="220" stroke="#ddd" stroke-width="1" stroke-dasharray="3,3"/>
    <line x1="330" y1="60" x2="330" y2="220" stroke="#ddd" stroke-width="1" stroke-dasharray="3,3"/>

    <!-- 日期标签 -->
    <text x="30" y="268" text-anchor="middle" fill="#bbb" font-size="8">周五</text>
    <text x="90" y="268" text-anchor="middle" fill="#bbb" font-size="8">周六</text>
    <text x="150" y="268" text-anchor="middle" fill="#bbb" font-size="8">周日</text>
    <text x="210" y="268" text-anchor="middle" fill="#333" font-size="8" font-weight="700">周一</text>
    <text x="270" y="268" text-anchor="middle" fill="#bbb" font-size="8">周二</text>
    <text x="330" y="268" text-anchor="middle" fill="#bbb" font-size="8">周三</text>
    <text x="390" y="268" text-anchor="middle" fill="#ccc" font-size="8">周四</text>
  </svg>

  <!-- 图例 + 数据 -->
  <div style="display: flex; justify-content: space-between; padding: 12px 0; border-top: 1px solid #eee; border-bottom: 1px solid #eee; margin-bottom: 14px;">
    <div style="display: flex; align-items: center; gap: 6px;">
      <div style="width: 16px; height: 4px; background: #2563eb; border-radius: 2px;"></div>
      <span style="font-size: 11px; color: #666;">飞书 <b style="color: #333;">355</b></span>
    </div>
    <div style="display: flex; align-items: center; gap: 6px;">
      <div style="width: 16px; height: 4px; background: #7c3aed; border-radius: 2px;"></div>
      <span style="font-size: 11px; color: #666;">Codex <b style="color: #333;">293</b></span>
    </div>
    <div style="display: flex; align-items: center; gap: 6px;">
      <div style="width: 16px; height: 4px; background: #0891b2; border-radius: 2px;"></div>
      <span style="font-size: 11px; color: #666;">Claude <b style="color: #333;">65</b></span>
    </div>
    <div style="font-size: 11px; color: #999;">
      高峰 <b style="color: #333;">22:00</b>
    </div>
  </div>

  <!-- 金句 -->
  <div style="text-align: center;">
    <div style="font-size: 13px; color: #555; line-height: 1.7;">
      「所有的大人都曾经是小孩，<br/>只是很少有人记得。<br/>而所有的提问都曾经是好奇心。」
    </div>
    <div style="font-size: 10px; color: #ccc; margin-top: 6px;">—— 圣埃克苏佩里 · 曲直续</div>
  </div>
</div>
</body>
</html>
