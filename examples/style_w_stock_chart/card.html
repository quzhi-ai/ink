<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 390px; height: 520px; overflow: hidden; }
</style>
</head>
<body>
<div style="font-family: -apple-system, 'SF Pro Display', 'PingFang SC', sans-serif; max-width: 480px; margin: 0 auto; background: #131722; border-radius: 8px; overflow: hidden; border: 1px solid #2a2e39;">
  <h2 class="sr-only">股票K线图风格 AI 对话统计卡片</h2>

  <!-- 顶栏 -->
  <div style="padding: 12px 16px; border-bottom: 1px solid #2a2e39; display: flex; justify-content: space-between; align-items: center;">
    <div style="display: flex; align-items: center; gap: 10px;">
      <span style="font-size: 15px; font-weight: 700; color: #d1d4dc;">QUZHI.AI</span>
      <span style="font-size: 11px; color: #787b86;">曲直人机交互指数</span>
    </div>
    <div style="display: flex; gap: 8px;">
      <span style="font-size: 10px; color: #787b86; padding: 2px 8px; border: 1px solid #2a2e39; border-radius: 3px;">1W</span>
      <span style="font-size: 10px; color: #2962ff; padding: 2px 8px; border: 1px solid #2962ff; border-radius: 3px; background: rgba(41,98,255,0.1);">周线</span>
    </div>
  </div>

  <!-- 价格区 -->
  <div style="padding: 12px 16px 4px; display: flex; align-items: baseline; gap: 12px;">
    <span style="font-size: 28px; font-weight: 700; color: #26a69a;">713</span>
    <span style="font-size: 12px; color: #26a69a;">+674 (+1728.21%)</span>
    <span style="font-size: 10px; color: #787b86;">周合计</span>
  </div>

  <!-- K线图区域 -->
  <div style="padding: 8px 16px 16px;">
    <svg viewBox="0 0 440 180" width="100%" style="display: block;">
      <!-- 网格线 -->
      <line x1="0" y1="36" x2="440" y2="36" stroke="#1e222d" stroke-width="0.5"/>
      <line x1="0" y1="72" x2="440" y2="72" stroke="#1e222d" stroke-width="0.5"/>
      <line x1="0" y1="108" x2="440" y2="108" stroke="#1e222d" stroke-width="0.5"/>
      <line x1="0" y1="144" x2="440" y2="144" stroke="#1e222d" stroke-width="0.5"/>

      <!-- 刻度 -->
      <text x="435" y="34" fill="#787b86" font-size="9" text-anchor="end">160</text>
      <text x="435" y="70" fill="#787b86" font-size="9" text-anchor="end">120</text>
      <text x="435" y="106" fill="#787b86" font-size="9" text-anchor="end">80</text>
      <text x="435" y="142" fill="#787b86" font-size="9" text-anchor="end">40</text>

      <!-- 成交量柱 (底部) -->
      <rect x="20" y="155" width="40" height="12" rx="1" fill="rgba(38,166,154,0.3)"/>
      <rect x="85" y="150" width="40" height="17" rx="1" fill="rgba(38,166,154,0.3)"/>
      <rect x="150" y="152" width="40" height="15" rx="1" fill="rgba(38,166,154,0.3)"/>
      <rect x="215" y="142" width="40" height="25" rx="1" fill="rgba(38,166,154,0.5)"/>
      <rect x="280" y="146" width="40" height="21" rx="1" fill="rgba(239,83,80,0.3)"/>
      <rect x="345" y="157" width="40" height="10" rx="1" fill="rgba(239,83,80,0.3)"/>

      <!-- K线蜡烛 -->
      <!-- 周五 91 绿(涨) -->
      <line x1="40" y1="100" x2="40" y2="115" stroke="#26a69a" stroke-width="1.5"/>
      <rect x="28" y="103" width="24" height="9" rx="1" fill="#26a69a"/>

      <!-- 周六 109 绿(涨) -->
      <line x1="105" y1="82" x2="105" y2="100" stroke="#26a69a" stroke-width="1.5"/>
      <rect x="93" y="85" width="24" height="10" rx="1" fill="#26a69a"/>

      <!-- 周日 97 红(跌) -->
      <line x1="170" y1="88" x2="170" y2="108" stroke="#ef5350" stroke-width="1.5"/>
      <rect x="158" y="91" width="24" height="12" rx="1" fill="#ef5350"/>

      <!-- 周一 166 绿(大涨) ★ -->
      <line x1="235" y1="20" x2="235" y2="55" stroke="#26a69a" stroke-width="1.5"/>
      <rect x="223" y="24" width="24" height="22" rx="1" fill="#26a69a"/>
      <text x="235" y="16" fill="#26a69a" font-size="10" text-anchor="middle" font-weight="700">166 ▲</text>

      <!-- 周二 133 红(跌) -->
      <line x1="300" y1="42" x2="300" y2="68" stroke="#ef5350" stroke-width="1.5"/>
      <rect x="288" y="46" width="24" height="16" rx="1" fill="#ef5350"/>

      <!-- 周三 78 红(跌) -->
      <line x1="365" y1="98" x2="365" y2="120" stroke="#ef5350" stroke-width="1.5"/>
      <rect x="353" y="101" width="24" height="14" rx="1" fill="#ef5350"/>

      <!-- X轴日期 -->
      <text x="40" y="177" fill="#787b86" font-size="9" text-anchor="middle">周五</text>
      <text x="105" y="177" fill="#787b86" font-size="9" text-anchor="middle">周六</text>
      <text x="170" y="177" fill="#787b86" font-size="9" text-anchor="middle">周日</text>
      <text x="235" y="177" fill="#26a69a" font-size="9" text-anchor="middle" font-weight="700">周一</text>
      <text x="300" y="177" fill="#787b86" font-size="9" text-anchor="middle">周二</text>
      <text x="365" y="177" fill="#787b86" font-size="9" text-anchor="middle">周三</text>
    </svg>
  </div>

  <!-- 指标面板 -->
  <div style="padding: 0 16px 14px; display: flex; gap: 16px; font-size: 11px;">
    <div>
      <span style="color: #787b86;">开盘</span>
      <span style="color: #d1d4dc; margin-left: 4px;">91</span>
    </div>
    <div>
      <span style="color: #787b86;">最高</span>
      <span style="color: #26a69a; margin-left: 4px;">166</span>
    </div>
    <div>
      <span style="color: #787b86;">最低</span>
      <span style="color: #ef5350; margin-left: 4px;">39</span>
    </div>
    <div>
      <span style="color: #787b86;">均线</span>
      <span style="color: #d1d4dc; margin-left: 4px;">102</span>
    </div>
    <div>
      <span style="color: #787b86;">振幅</span>
      <span style="color: #d1d4dc; margin-left: 4px;">76.8%</span>
    </div>
  </div>

  <!-- 底部分析师评论 -->
  <div style="border-top: 1px solid #2a2e39; padding: 14px 16px;">
    <div style="font-size: 12px; color: #787b86; line-height: 1.7;">
      <span style="color: #2962ff;">分析师观点：</span>
      <span style="color: #d1d4dc;">本周 QUZHI.AI 指数表现强劲，周一放量大涨创新高。深夜时段交投活跃（22:00），建议投资者持续关注。</span>
    </div>
    <div style="margin-top: 10px; font-size: 12px; color: #555; line-height: 1.7; font-style: italic;">
      「市场就是把钱从急躁的人手里转到有耐心的人手里。——而对话，是最有耐心的投资。」
    </div>
    <div style="font-size: 10px; color: #363a45; margin-top: 4px;">—— 巴菲特 · 曲直改编</div>
  </div>
</div>
</body>
</html>
