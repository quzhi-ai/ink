<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 390px; height: 520px; overflow: hidden; }
</style>
</head>
<body>
<div style="font-family: -apple-system, 'SF Pro Display', 'PingFang SC', sans-serif; max-width: 390px; margin: 0 auto; background: #000; border-radius: 40px; overflow: hidden; padding: 20px 0 0; border: 4px solid #333;">
  <h2 class="sr-only">运动手表/健身APP风格 AI 对话统计卡片</h2>

  <!-- 状态栏 -->
  <div style="display: flex; justify-content: space-between; padding: 0 28px 12px; font-size: 12px; color: #fff;">
    <span>22:00</span>
    <span style="font-size: 10px; color: #86efac;">● 已连接 AI</span>
  </div>

  <div style="padding: 0 20px 24px;">
    <!-- 圆环 -->
    <div style="position: relative; width: 220px; height: 220px; margin: 0 auto 20px;">
      <svg viewBox="0 0 220 220" width="220" height="220">
        <!-- 外环 - 总轮次 (红) -->
        <circle cx="110" cy="110" r="100" fill="none" stroke="#3a1010" stroke-width="14"/>
        <circle cx="110" cy="110" r="100" fill="none" stroke="#ef4444" stroke-width="14"
          stroke-dasharray="449 628.3" stroke-linecap="round" transform="rotate(-90 110 110)"/>
        <!-- 中环 - 飞书 (绿) -->
        <circle cx="110" cy="110" r="82" fill="none" stroke="#0a2a0a" stroke-width="14"/>
        <circle cx="110" cy="110" r="82" fill="none" stroke="#22c55e" stroke-width="14"
          stroke-dasharray="256 515.2" stroke-linecap="round" transform="rotate(-90 110 110)"/>
        <!-- 内环 - Codex (蓝) -->
        <circle cx="110" cy="110" r="64" fill="none" stroke="#0a1a2a" stroke-width="14"/>
        <circle cx="110" cy="110" r="64" fill="none" stroke="#3b82f6" stroke-width="14"
          stroke-dasharray="165 402.1" stroke-linecap="round" transform="rotate(-90 110 110)"/>
      </svg>
      <!-- 中心文字 -->
      <div style="position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <div style="font-size: 42px; font-weight: 800; color: #fff; line-height: 1;">713</div>
        <div style="font-size: 11px; color: #888; margin-top: 2px;">本周对话</div>
      </div>
    </div>

    <!-- 三环图例 -->
    <div style="display: flex; justify-content: center; gap: 20px; margin-bottom: 20px;">
      <div style="display: flex; align-items: center; gap: 6px;">
        <div style="width: 10px; height: 10px; border-radius: 50%; background: #ef4444;"></div>
        <div>
          <div style="font-size: 14px; font-weight: 700; color: #fff;">713</div>
          <div style="font-size: 9px; color: #666;">总对话</div>
        </div>
      </div>
      <div style="display: flex; align-items: center; gap: 6px;">
        <div style="width: 10px; height: 10px; border-radius: 50%; background: #22c55e;"></div>
        <div>
          <div style="font-size: 14px; font-weight: 700; color: #fff;">355</div>
          <div style="font-size: 9px; color: #666;">飞书</div>
        </div>
      </div>
      <div style="display: flex; align-items: center; gap: 6px;">
        <div style="width: 10px; height: 10px; border-radius: 50%; background: #3b82f6;"></div>
        <div>
          <div style="font-size: 14px; font-weight: 700; color: #fff;">293</div>
          <div style="font-size: 9px; color: #666;">Codex</div>
        </div>
      </div>
    </div>

    <!-- 每日活动 -->
    <div style="background: #1a1a1a; border-radius: 16px; padding: 16px; margin-bottom: 12px;">
      <div style="font-size: 12px; font-weight: 600; color: #fff; margin-bottom: 12px;">每日对话量</div>
      <div style="display: flex; align-items: flex-end; gap: 6px; height: 60px; margin-bottom: 6px;">
        <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%;">
          <div style="font-size: 8px; color: #888; margin-bottom: 3px;">91</div>
          <div style="width:100%; border-radius:4px 4px 2px 2px; height:54.8%; background: linear-gradient(180deg, #ef4444, #991b1b);"></div>
        </div>
        <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%;">
          <div style="font-size: 8px; color: #888; margin-bottom: 3px;">109</div>
          <div style="width:100%; border-radius:4px 4px 2px 2px; height:65.7%; background: linear-gradient(180deg, #ef4444, #991b1b);"></div>
        </div>
        <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%;">
          <div style="font-size: 8px; color: #888; margin-bottom: 3px;">97</div>
          <div style="width:100%; border-radius:4px 4px 2px 2px; height:58.4%; background: linear-gradient(180deg, #ef4444, #991b1b);"></div>
        </div>
        <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%;">
          <div style="font-size: 8px; color: #22c55e; margin-bottom: 3px; font-weight: 700;">166</div>
          <div style="width:100%; border-radius:4px 4px 2px 2px; height:100%; background: linear-gradient(180deg, #22c55e, #15803d);"></div>
        </div>
        <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%;">
          <div style="font-size: 8px; color: #888; margin-bottom: 3px;">133</div>
          <div style="width:100%; border-radius:4px 4px 2px 2px; height:80.1%; background: linear-gradient(180deg, #ef4444, #991b1b);"></div>
        </div>
        <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%;">
          <div style="font-size: 8px; color: #888; margin-bottom: 3px;">78</div>
          <div style="width:100%; border-radius:4px 4px 2px 2px; height:47%; background: linear-gradient(180deg, #ef4444, #991b1b);"></div>
        </div>
        <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%;">
          <div style="font-size: 8px; color: #555; margin-bottom: 3px;">39</div>
          <div style="width:100%; border-radius:4px 4px 2px 2px; height:23.5%; background: linear-gradient(180deg, #555, #333);"></div>
        </div>
      </div>
      <div style="display:flex; gap:6px;">
        <div style="flex:1; text-align:center; font-size:9px; color:#555;">五</div>
        <div style="flex:1; text-align:center; font-size:9px; color:#555;">六</div>
        <div style="flex:1; text-align:center; font-size:9px; color:#555;">日</div>
        <div style="flex:1; text-align:center; font-size:9px; color:#22c55e; font-weight:600;">一</div>
        <div style="flex:1; text-align:center; font-size:9px; color:#555;">二</div>
        <div style="flex:1; text-align:center; font-size:9px; color:#555;">三</div>
        <div style="flex:1; text-align:center; font-size:9px; color:#444;">四</div>
      </div>
    </div>

    <!-- 指标卡片 -->
    <div style="display: flex; gap: 8px; margin-bottom: 16px;">
      <div style="flex: 1; background: #1a1a1a; border-radius: 12px; padding: 12px; text-align: center;">
        <div style="font-size: 9px; color: #666;">日均</div>
        <div style="font-size: 20px; font-weight: 700; color: #fff;">102</div>
        <div style="font-size: 9px; color: #ef4444;">轮/天</div>
      </div>
      <div style="flex: 1; background: #1a1a1a; border-radius: 12px; padding: 12px; text-align: center;">
        <div style="font-size: 9px; color: #666;">峰值</div>
        <div style="font-size: 20px; font-weight: 700; color: #fff;">166</div>
        <div style="font-size: 9px; color: #22c55e;">周一</div>
      </div>
      <div style="flex: 1; background: #1a1a1a; border-radius: 12px; padding: 12px; text-align: center;">
        <div style="font-size: 9px; color: #666;">高峰</div>
        <div style="font-size: 20px; font-weight: 700; color: #fff;">22h</div>
        <div style="font-size: 9px; color: #3b82f6;">夜猫子</div>
      </div>
    </div>

    <!-- 金句 -->
    <div style="text-align: center; padding: 8px 0;">
      <div style="font-size: 12px; color: #555; line-height: 1.6;">
        「身体和大脑，总有一个在路上。<br/>本周你的大脑跑了 713 公里。」
      </div>
      <div style="font-size: 9px; color: #333; margin-top: 4px;">—— 曲直 · 第26周训练总结</div>
    </div>
  </div>

  <!-- 底部横条 -->
  <div style="height: 5px; width: 120px; background: #333; border-radius: 3px; margin: 4px auto 8px;"></div>
</div>
</body>
</html>
