<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 390px; height: 520px; overflow: hidden; }
</style>
</head>
<body>
<div style="font-family: -apple-system, 'PingFang SC', sans-serif; max-width: 420px; margin: 0 auto; background: #fff; border: 3px solid #111; border-radius: 4px; overflow: hidden;">
  <h2 class="sr-only">漫画分镜风格 AI 对话统计卡片</h2>

  <!-- 第一行：大格 + 竖格 -->
  <div style="display: flex; border-bottom: 3px solid #111;">
    <!-- 大格：主角登场 -->
    <div style="flex: 2; padding: 20px; border-right: 3px solid #111; position: relative; min-height: 140px;">
      <!-- 速度线 -->
      <div style="position: absolute; inset: 0; overflow: hidden; pointer-events: none;">
        <div style="position: absolute; top: 20%; right: 10%; width: 60%; height: 1px; background: #ddd; transform: rotate(-15deg);"></div>
        <div style="position: absolute; top: 35%; right: 5%; width: 50%; height: 1px; background: #eee; transform: rotate(-12deg);"></div>
        <div style="position: absolute; top: 50%; right: 15%; width: 40%; height: 1px; background: #ddd; transform: rotate(-18deg);"></div>
      </div>
      <div style="position: relative; z-index: 1;">
        <div style="font-size: 11px; color: #999; margin-bottom: 8px;">第26周 · 曲直</div>
        <div style="font-size: 64px; font-weight: 900; color: #111; line-height: 0.9; letter-spacing: -2px;">713</div>
        <div style="font-size: 14px; color: #555; margin-top: 4px;">轮对话！！</div>
      </div>
      <!-- 对话气泡 -->
      <div style="position: absolute; bottom: 12px; right: 12px; background: #111; color: #fff; padding: 6px 12px; border-radius: 12px 12px 4px 12px; font-size: 10px; font-weight: 600;">
        什么！？
      </div>
    </div>
    <!-- 竖格：来源 -->
    <div style="flex: 1; display: flex; flex-direction: column;">
      <div style="flex: 1; padding: 12px; border-bottom: 2px solid #111; display: flex; align-items: center; justify-content: center; flex-direction: column; background: repeating-linear-gradient(45deg, transparent 0, transparent 4px, rgba(0,0,0,0.02) 4px, rgba(0,0,0,0.02) 5px);">
        <div style="font-size: 28px; font-weight: 900; color: #111;">355</div>
        <div style="font-size: 10px; color: #888;">飞书</div>
      </div>
      <div style="flex: 1; padding: 12px; border-bottom: 2px solid #111; display: flex; align-items: center; justify-content: center; flex-direction: column;">
        <div style="font-size: 28px; font-weight: 900; color: #111;">293</div>
        <div style="font-size: 10px; color: #888;">Codex</div>
      </div>
      <div style="flex: 1; padding: 12px; display: flex; align-items: center; justify-content: center; flex-direction: column; background: repeating-linear-gradient(45deg, transparent 0, transparent 4px, rgba(0,0,0,0.02) 4px, rgba(0,0,0,0.02) 5px);">
        <div style="font-size: 28px; font-weight: 900; color: #111;">65</div>
        <div style="font-size: 10px; color: #888;">Claude</div>
      </div>
    </div>
  </div>

  <!-- 第二行：每日 -->
  <div style="border-bottom: 3px solid #111; padding: 16px; position: relative;">
    <!-- 爆炸效果框 -->
    <div style="position: absolute; top: 8px; right: 8px; padding: 4px 10px; border: 2px solid #111; transform: rotate(3deg); background: #fff;">
      <span style="font-size: 10px; font-weight: 900; color: #111;">周一大爆发!!</span>
    </div>
    <div style="display: flex; align-items: flex-end; gap: 6px; height: 60px; padding-right: 100px;">
      <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%;">
        <div style="width:100%; background:#111; border-radius:1px; height:54.8%;"></div>
        <div style="font-size:8px; color:#aaa; margin-top:3px;">五</div>
      </div>
      <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%;">
        <div style="width:100%; background:#111; border-radius:1px; height:65.7%;"></div>
        <div style="font-size:8px; color:#aaa; margin-top:3px;">六</div>
      </div>
      <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%;">
        <div style="width:100%; background:#111; border-radius:1px; height:58.4%;"></div>
        <div style="font-size:8px; color:#aaa; margin-top:3px;">日</div>
      </div>
      <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%;">
        <div style="width:100%; background:#111; border-radius:1px; height:100%; position: relative;">
          <div style="position: absolute; top: -14px; left: 50%; transform: translateX(-50%); font-size: 10px; font-weight: 900; color: #111;">166</div>
        </div>
        <div style="font-size:8px; color:#111; margin-top:3px; font-weight:900;">一★</div>
      </div>
      <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%;">
        <div style="width:100%; background:#111; border-radius:1px; height:80.1%;"></div>
        <div style="font-size:8px; color:#aaa; margin-top:3px;">二</div>
      </div>
      <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%;">
        <div style="width:100%; background:#111; border-radius:1px; height:47%;"></div>
        <div style="font-size:8px; color:#aaa; margin-top:3px;">三</div>
      </div>
      <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%;">
        <div style="width:100%; background:#ccc; border-radius:1px; height:23.5%;"></div>
        <div style="font-size:8px; color:#ccc; margin-top:3px;">四</div>
      </div>
    </div>
  </div>

  <!-- 第三行：金句 (对话气泡) -->
  <div style="display: flex; gap: 0;">
    <div style="flex: 1; padding: 16px; border-right: 3px solid #111; display: flex; align-items: center; justify-content: center;">
      <div style="background: #f5f5f5; border: 2px solid #111; border-radius: 16px 16px 16px 4px; padding: 10px 14px; max-width: 180px;">
        <div style="font-size: 12px; color: #333; line-height: 1.6;">日均 102 轮…这人是不是不用睡觉？</div>
      </div>
    </div>
    <div style="flex: 1; padding: 16px; display: flex; align-items: center; justify-content: center; background: repeating-linear-gradient(45deg, transparent 0, transparent 4px, rgba(0,0,0,0.02) 4px, rgba(0,0,0,0.02) 5px);">
      <div style="text-align: center;">
        <div style="font-size: 13px; color: #333; line-height: 1.7; font-weight: 500;">
          「漫画的分镜就是时间。<br/>对话的轮次也是。」
        </div>
        <div style="font-size: 9px; color: #bbb; margin-top: 6px;">—— 手冢治虫 · 意译</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
