<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 390px; height: 520px; overflow: hidden; }
</style>
</head>
<body>
<div style="font-family: -apple-system, 'SF Pro Display', 'PingFang SC', sans-serif; max-width: 480px; margin: 0 auto; background: #fffef8; border-radius: 6px; overflow: hidden; border: 1px solid #e8e4d8; box-shadow: 0 2px 12px rgba(0,0,0,0.06); position: relative;">
  <h2 class="sr-only">明信片风格 AI 对话统计卡片</h2>

  <div style="display: flex; min-height: 520px;">
    <!-- 左半：图面 -->
    <div style="flex: 1; padding: 32px 24px; display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden;">
      <!-- 装饰圆 -->
      <div style="position: absolute; top: -20px; right: -20px; width: 140px; height: 140px; border-radius: 50%; border: 1px solid rgba(200,180,140,0.3);"></div>
      <div style="position: absolute; bottom: 40px; left: -30px; width: 100px; height: 100px; border-radius: 50%; border: 1px solid rgba(200,180,140,0.2);"></div>

      <div style="position: relative; z-index: 1;">
        <!-- 标题 -->
        <div style="font-size: 10px; color: #c8b48c; letter-spacing: 3px; margin-bottom: 16px;">寄自人机之间</div>
        <div style="font-size: 28px; font-weight: 700; color: #2c2820; line-height: 1.3; margin-bottom: 24px;">
          曲直的<br/>第二十六周
        </div>

        <!-- 大数字 -->
        <div style="display: flex; align-items: baseline; gap: 6px; margin-bottom: 32px;">
          <span style="font-size: 64px; font-weight: 800; color: #2c2820; line-height: 1; font-family: 'DIN Alternate', 'Helvetica Neue', sans-serif;">713</span>
          <span style="font-size: 14px; color: #a09880;">轮对话</span>
        </div>

        <!-- 每日圆点 -->
        <div style="display: flex; gap: 10px; margin-bottom: 8px;">
          <div style="display: flex; flex-direction: column; align-items: center; gap: 4px;">
            <div style="width: 28px; height: 28px; border-radius: 50%; background: rgba(180,140,80,0.25); display: flex; align-items: center; justify-content: center; font-size: 9px; color: #8a7a5a; font-weight: 600;">91</div>
            <div style="font-size: 8px; color: #c8b48c;">五</div>
          </div>
          <div style="display: flex; flex-direction: column; align-items: center; gap: 4px;">
            <div style="width: 32px; height: 32px; border-radius: 50%; background: rgba(180,140,80,0.3); display: flex; align-items: center; justify-content: center; font-size: 9px; color: #8a7a5a; font-weight: 600;">109</div>
            <div style="font-size: 8px; color: #c8b48c;">六</div>
          </div>
          <div style="display: flex; flex-direction: column; align-items: center; gap: 4px;">
            <div style="width: 30px; height: 30px; border-radius: 50%; background: rgba(180,140,80,0.27); display: flex; align-items: center; justify-content: center; font-size: 9px; color: #8a7a5a; font-weight: 600;">97</div>
            <div style="font-size: 8px; color: #c8b48c;">日</div>
          </div>
          <div style="display: flex; flex-direction: column; align-items: center; gap: 4px;">
            <div style="width: 44px; height: 44px; border-radius: 50%; background: rgba(180,120,60,0.45); display: flex; align-items: center; justify-content: center; font-size: 11px; color: #5a4a30; font-weight: 700;">166</div>
            <div style="font-size: 8px; color: #8a7a5a; font-weight: 600;">一</div>
          </div>
          <div style="display: flex; flex-direction: column; align-items: center; gap: 4px;">
            <div style="width: 38px; height: 38px; border-radius: 50%; background: rgba(180,140,80,0.35); display: flex; align-items: center; justify-content: center; font-size: 9px; color: #8a7a5a; font-weight: 600;">133</div>
            <div style="font-size: 8px; color: #c8b48c;">二</div>
          </div>
          <div style="display: flex; flex-direction: column; align-items: center; gap: 4px;">
            <div style="width: 24px; height: 24px; border-radius: 50%; background: rgba(180,140,80,0.2); display: flex; align-items: center; justify-content: center; font-size: 8px; color: #8a7a5a; font-weight: 600;">78</div>
            <div style="font-size: 8px; color: #c8b48c;">三</div>
          </div>
          <div style="display: flex; flex-direction: column; align-items: center; gap: 4px;">
            <div style="width: 18px; height: 18px; border-radius: 50%; background: rgba(180,140,80,0.12); display: flex; align-items: center; justify-content: center; font-size: 7px; color: #bbb;">39</div>
            <div style="font-size: 8px; color: #ddd;">四</div>
          </div>
        </div>
      </div>

      <!-- 来源 -->
      <div style="position: relative; z-index: 1; margin-top: 20px;">
        <div style="display: flex; gap: 16px; font-size: 11px;">
          <div><span style="color: #c8b48c;">飞书</span> <span style="color: #2c2820; font-weight: 700;">355</span></div>
          <div><span style="color: #c8b48c;">Codex</span> <span style="color: #2c2820; font-weight: 700;">293</span></div>
          <div><span style="color: #c8b48c;">Claude</span> <span style="color: #2c2820; font-weight: 700;">65</span></div>
        </div>
      </div>
    </div>

    <!-- 中线 -->
    <div style="width: 1px; background: repeating-linear-gradient(180deg, #d8d0c0 0, #d8d0c0 6px, transparent 6px, transparent 12px); margin: 20px 0;"></div>

    <!-- 右半：信件面 -->
    <div style="width: 200px; padding: 28px 20px; display: flex; flex-direction: column; justify-content: space-between;">
      <!-- 邮票 -->
      <div style="align-self: flex-end; width: 56px; height: 68px; border: 2px solid #d8d0c0; border-radius: 2px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #fffef8; margin-bottom: 20px;">
        <div style="font-size: 20px; font-weight: 800; color: #2c2820; line-height: 1;">102</div>
        <div style="font-size: 7px; color: #a09880; margin-top: 2px; letter-spacing: 1px;">轮/天</div>
        <div style="width: 30px; height: 1px; background: #d8d0c0; margin: 4px 0;"></div>
        <div style="font-size: 6px; color: #c8b48c; letter-spacing: 1px;">2026</div>
      </div>

      <!-- 邮戳 -->
      <div style="align-self: flex-end; width: 60px; height: 60px; border: 2px solid rgba(200,100,80,0.3); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; transform: rotate(-12deg); margin-bottom: 24px;">
        <div style="font-size: 7px; color: rgba(200,100,80,0.5); letter-spacing: 1px;">深圳</div>
        <div style="font-size: 10px; color: rgba(200,100,80,0.6); font-weight: 700;">22:00</div>
        <div style="font-size: 7px; color: rgba(200,100,80,0.4);">夜猫子</div>
      </div>

      <!-- 地址 -->
      <div style="flex: 1;"></div>

      <!-- 收件 -->
      <div>
        <div style="font-size: 9px; color: #c8b48c; margin-bottom: 8px;">收</div>
        <div style="font-size: 13px; color: #2c2820; font-weight: 600; line-height: 1.6; border-bottom: 1px solid #e8e4d8; padding-bottom: 4px; margin-bottom: 6px;">致未来的曲直</div>
        <div style="font-size: 11px; color: #a09880; line-height: 1.7;">
          这一周你向机器<br/>
          提出了 713 个问题。<br/>
          <span style="color: #8a7a5a;">愿每个问题<br/>都比答案更有价值。</span>
        </div>
      </div>

      <!-- 日期 -->
      <div style="font-size: 9px; color: #d8d0c0; margin-top: 16px; letter-spacing: 1px;">
        2026年6月26日
      </div>
    </div>
  </div>
</div>
</body>
</html>
