<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 390px; height: 520px; overflow: hidden; }
</style>
</head>
<body>
<div style="font-family: 'Helvetica Neue', Arial, 'PingFang SC', sans-serif; max-width: 420px; margin: 0 auto; background: #fff; border-radius: 2px; padding: 28px 24px; border: 1px solid #eee;">
  <h2 class="sr-only">宜家说明书风格 AI 对话统计卡片</h2>

  <!-- 产品名 -->
  <div style="margin-bottom: 20px;">
    <div style="font-size: 28px; font-weight: 800; color: #111; letter-spacing: -1px;">DIALOGËN</div>
    <div style="font-size: 12px; color: #999; margin-top: 2px;">人机对话组装套件 · 第26周款</div>
  </div>

  <!-- 产品编号 -->
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid #eee;">
    <div style="font-size: 11px; color: #bbb;">货号 713-026-2026</div>
    <div style="font-size: 11px; color: #bbb;">设计师：曲直</div>
  </div>

  <!-- 零件清单 -->
  <div style="margin-bottom: 20px;">
    <div style="font-size: 11px; font-weight: 700; color: #111; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px;">零件清单</div>

    <div style="display: flex; gap: 16px;">
      <!-- 零件A -->
      <div style="flex: 1; text-align: center; padding: 16px 8px; border: 1px solid #eee; border-radius: 4px;">
        <svg viewBox="0 0 60 60" width="48" height="48" style="margin-bottom: 8px;">
          <rect x="10" y="10" width="40" height="40" rx="4" fill="none" stroke="#333" stroke-width="2"/>
          <text x="30" y="36" text-anchor="middle" fill="#333" font-size="14" font-weight="700">F</text>
        </svg>
        <div style="font-size: 11px; color: #333; font-weight: 600;">飞书板 (A)</div>
        <div style="font-size: 18px; font-weight: 800; color: #111;">×355</div>
      </div>
      <!-- 零件B -->
      <div style="flex: 1; text-align: center; padding: 16px 8px; border: 1px solid #eee; border-radius: 4px;">
        <svg viewBox="0 0 60 60" width="48" height="48" style="margin-bottom: 8px;">
          <circle cx="30" cy="30" r="20" fill="none" stroke="#333" stroke-width="2"/>
          <text x="30" y="36" text-anchor="middle" fill="#333" font-size="14" font-weight="700">C</text>
        </svg>
        <div style="font-size: 11px; color: #333; font-weight: 600;">编程轴 (B)</div>
        <div style="font-size: 18px; font-weight: 800; color: #111;">×293</div>
      </div>
      <!-- 零件C -->
      <div style="flex: 0.6; text-align: center; padding: 16px 8px; border: 1px solid #eee; border-radius: 4px;">
        <svg viewBox="0 0 60 60" width="48" height="48" style="margin-bottom: 8px;">
          <polygon points="30,8 52,48 8,48" fill="none" stroke="#333" stroke-width="2" stroke-linejoin="round"/>
          <text x="30" y="42" text-anchor="middle" fill="#333" font-size="12" font-weight="700">D</text>
        </svg>
        <div style="font-size: 11px; color: #333; font-weight: 600;">桌面钉 (C)</div>
        <div style="font-size: 18px; font-weight: 800; color: #111;">×65</div>
      </div>
    </div>
  </div>

  <!-- 组装步骤 -->
  <div style="margin-bottom: 20px;">
    <div style="font-size: 11px; font-weight: 700; color: #111; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px;">组装步骤</div>

    <div style="display: flex; gap: 8px;">
      <div style="flex: 1; border: 1px solid #eee; border-radius: 4px; padding: 12px 8px;">
        <div style="display: flex; align-items: center; gap: 6px; margin-bottom: 8px;">
          <div style="width: 20px; height: 20px; border-radius: 50%; background: #111; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700;">1</div>
          <span style="font-size: 9px; color: #999;">周五–日</span>
        </div>
        <div style="display: flex; align-items: flex-end; gap: 2px; height: 30px; justify-content: center;">
          <div style="width: 8px; background: #ddd; border-radius: 1px; height: 65%;"></div>
          <div style="width: 8px; background: #ddd; border-radius: 1px; height: 80%;"></div>
          <div style="width: 8px; background: #ddd; border-radius: 1px; height: 72%;"></div>
        </div>
        <div style="text-align: center; font-size: 9px; color: #aaa; margin-top: 4px;">打底安装</div>
      </div>

      <div style="flex: 1; border: 1px solid #eee; border-radius: 4px; padding: 12px 8px;">
        <div style="display: flex; align-items: center; gap: 6px; margin-bottom: 8px;">
          <div style="width: 20px; height: 20px; border-radius: 50%; background: #111; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700;">2</div>
          <span style="font-size: 9px; color: #c23a2b; font-weight: 600;">周一 ⚠</span>
        </div>
        <div style="display: flex; align-items: flex-end; gap: 2px; height: 30px; justify-content: center;">
          <div style="width: 16px; background: #c23a2b; border-radius: 1px; height: 100%;"></div>
        </div>
        <div style="text-align: center; font-size: 9px; color: #c23a2b; margin-top: 4px;">猛力拧紧!</div>
      </div>

      <div style="flex: 1; border: 1px solid #eee; border-radius: 4px; padding: 12px 8px;">
        <div style="display: flex; align-items: center; gap: 6px; margin-bottom: 8px;">
          <div style="width: 20px; height: 20px; border-radius: 50%; background: #111; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700;">3</div>
          <span style="font-size: 9px; color: #999;">周二–四</span>
        </div>
        <div style="display: flex; align-items: flex-end; gap: 2px; height: 30px; justify-content: center;">
          <div style="width: 8px; background: #ddd; border-radius: 1px; height: 85%;"></div>
          <div style="width: 8px; background: #ddd; border-radius: 1px; height: 50%;"></div>
          <div style="width: 8px; background: #eee; border-radius: 1px; height: 25%;"></div>
        </div>
        <div style="text-align: center; font-size: 9px; color: #aaa; margin-top: 4px;">收尾微调</div>
      </div>
    </div>
  </div>

  <!-- 注意事项 -->
  <div style="background: #fffde7; border-left: 3px solid #f59e0b; padding: 10px 12px; margin-bottom: 16px; border-radius: 2px;">
    <div style="font-size: 10px; color: #b45309; font-weight: 700; margin-bottom: 4px;">⚠ 注意</div>
    <div style="font-size: 11px; color: #92400e; line-height: 1.6;">
      最佳组装时间为每晚 22:00。日均使用 102 次。<br/>
      本产品不含螺丝刀，但包含无限耐心。
    </div>
  </div>

  <!-- 总数 + 金句 -->
  <div style="border-top: 1px solid #eee; padding-top: 14px; display: flex; justify-content: space-between; align-items: flex-end;">
    <div>
      <div style="font-size: 10px; color: #bbb;">组装完成度</div>
      <div style="font-size: 32px; font-weight: 900; color: #111; line-height: 1;">713<span style="font-size: 12px; font-weight: 400; color: #999;">/1000</span></div>
    </div>
    <div style="text-align: right; max-width: 200px;">
      <div style="font-size: 11px; color: #888; line-height: 1.5; font-style: italic;">「简单即是终极的复杂。」</div>
      <div style="font-size: 9px; color: #ccc; margin-top: 2px;">—— 达芬奇</div>
    </div>
  </div>
</div>
</body>
</html>
