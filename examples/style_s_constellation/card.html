<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 390px; height: 520px; overflow: hidden; }
</style>
</head>
<body>
<div style="font-family: -apple-system, 'SF Pro Display', 'PingFang SC', sans-serif; max-width: 420px; margin: 0 auto; background: #0a0e1a; border-radius: 16px; overflow: hidden; position: relative;">
  <h2 class="sr-only">星图风格 AI 对话统计卡片</h2>

  <div style="padding: 32px 24px 28px; position: relative;">
    <!-- 标题 -->
    <div style="text-align: center; margin-bottom: 24px; position: relative; z-index: 2;">
      <div style="font-size: 10px; color: rgba(255,255,255,0.2); letter-spacing: 4px; margin-bottom: 6px;">曲直 · 人机星图</div>
      <div style="font-size: 22px; font-weight: 300; color: rgba(255,255,255,0.85); letter-spacing: 3px;">第二十六周星图</div>
    </div>

    <!-- 星空 SVG -->
    <svg viewBox="0 0 380 240" width="100%" style="display: block; margin: 0 auto 20px; position: relative; z-index: 1;">
      <!-- 散落背景星 -->
      <circle cx="30" cy="20" r="0.5" fill="#fff" opacity="0.3"/>
      <circle cx="95" cy="45" r="0.4" fill="#fff" opacity="0.2"/>
      <circle cx="180" cy="15" r="0.6" fill="#fff" opacity="0.25"/>
      <circle cx="250" cy="35" r="0.4" fill="#fff" opacity="0.15"/>
      <circle cx="320" cy="20" r="0.5" fill="#fff" opacity="0.2"/>
      <circle cx="350" cy="60" r="0.3" fill="#fff" opacity="0.3"/>
      <circle cx="60" cy="90" r="0.4" fill="#fff" opacity="0.2"/>
      <circle cx="140" cy="180" r="0.5" fill="#fff" opacity="0.15"/>
      <circle cx="290" cy="170" r="0.4" fill="#fff" opacity="0.25"/>
      <circle cx="340" cy="140" r="0.3" fill="#fff" opacity="0.2"/>
      <circle cx="20" cy="200" r="0.5" fill="#fff" opacity="0.15"/>
      <circle cx="370" cy="200" r="0.4" fill="#fff" opacity="0.2"/>
      <circle cx="200" cy="230" r="0.3" fill="#fff" opacity="0.25"/>
      <circle cx="80" cy="150" r="0.4" fill="#fff" opacity="0.15"/>
      <circle cx="310" cy="100" r="0.5" fill="#fff" opacity="0.2"/>

      <!-- 星座连线 (七日) -->
      <line x1="45" y1="110" x2="95" y2="80" stroke="rgba(147,197,253,0.2)" stroke-width="0.8"/>
      <line x1="95" y1="80" x2="150" y2="95" stroke="rgba(147,197,253,0.2)" stroke-width="0.8"/>
      <line x1="150" y1="95" x2="210" y2="40" stroke="rgba(147,197,253,0.2)" stroke-width="0.8"/>
      <line x1="210" y1="40" x2="270" y2="55" stroke="rgba(147,197,253,0.2)" stroke-width="0.8"/>
      <line x1="270" y1="55" x2="310" y2="120" stroke="rgba(147,197,253,0.2)" stroke-width="0.8"/>
      <line x1="310" y1="120" x2="350" y2="165" stroke="rgba(147,197,253,0.2)" stroke-width="0.8"/>

      <!-- 七颗主星 (大小=轮次) -->
      <!-- 周五 91 -->
      <circle cx="45" cy="110" r="6" fill="rgba(147,197,253,0.15)" stroke="rgba(147,197,253,0.4)" stroke-width="0.5"/>
      <circle cx="45" cy="110" r="2.5" fill="#93c5fd"/>
      <text x="45" y="130" text-anchor="middle" fill="rgba(147,197,253,0.5)" font-size="8" font-family="PingFang SC">五 · 91</text>

      <!-- 周六 109 -->
      <circle cx="95" cy="80" r="7" fill="rgba(147,197,253,0.15)" stroke="rgba(147,197,253,0.4)" stroke-width="0.5"/>
      <circle cx="95" cy="80" r="3" fill="#93c5fd"/>
      <text x="95" y="100" text-anchor="middle" fill="rgba(147,197,253,0.5)" font-size="8" font-family="PingFang SC">六 · 109</text>

      <!-- 周日 97 -->
      <circle cx="150" cy="95" r="6.5" fill="rgba(147,197,253,0.15)" stroke="rgba(147,197,253,0.4)" stroke-width="0.5"/>
      <circle cx="150" cy="95" r="2.7" fill="#93c5fd"/>
      <text x="150" y="115" text-anchor="middle" fill="rgba(147,197,253,0.5)" font-size="8" font-family="PingFang SC">日 · 97</text>

      <!-- 周一 166 ★ 最亮 -->
      <circle cx="210" cy="40" r="14" fill="rgba(253,224,71,0.08)"/>
      <circle cx="210" cy="40" r="10" fill="rgba(253,224,71,0.12)" stroke="rgba(253,224,71,0.3)" stroke-width="0.5"/>
      <circle cx="210" cy="40" r="4.5" fill="#fde047"/>
      <text x="210" y="62" text-anchor="middle" fill="rgba(253,224,71,0.7)" font-size="9" font-weight="600" font-family="PingFang SC">一 · 166 ★</text>

      <!-- 周二 133 -->
      <circle cx="270" cy="55" r="8.5" fill="rgba(147,197,253,0.15)" stroke="rgba(147,197,253,0.4)" stroke-width="0.5"/>
      <circle cx="270" cy="55" r="3.5" fill="#93c5fd"/>
      <text x="270" y="75" text-anchor="middle" fill="rgba(147,197,253,0.5)" font-size="8" font-family="PingFang SC">二 · 133</text>

      <!-- 周三 78 -->
      <circle cx="310" cy="120" r="5.5" fill="rgba(147,197,253,0.12)" stroke="rgba(147,197,253,0.3)" stroke-width="0.5"/>
      <circle cx="310" cy="120" r="2.2" fill="#93c5fd" opacity="0.7"/>
      <text x="310" y="138" text-anchor="middle" fill="rgba(147,197,253,0.4)" font-size="8" font-family="PingFang SC">三 · 78</text>

      <!-- 周四 39 -->
      <circle cx="350" cy="165" r="3.5" fill="rgba(147,197,253,0.08)" stroke="rgba(147,197,253,0.2)" stroke-width="0.5"/>
      <circle cx="350" cy="165" r="1.5" fill="#93c5fd" opacity="0.4"/>
      <text x="350" y="182" text-anchor="middle" fill="rgba(147,197,253,0.25)" font-size="8" font-family="PingFang SC">四 · 39</text>

      <!-- 三个来源星云 -->
      <circle cx="90" cy="190" r="18" fill="rgba(96,165,250,0.06)" stroke="rgba(96,165,250,0.15)" stroke-width="0.5" stroke-dasharray="2,2"/>
      <circle cx="90" cy="190" r="2" fill="#60a5fa"/>
      <text x="90" y="215" text-anchor="middle" fill="rgba(96,165,250,0.6)" font-size="9" font-family="PingFang SC">飞书 355</text>

      <circle cx="210" cy="200" r="15" fill="rgba(192,132,252,0.06)" stroke="rgba(192,132,252,0.15)" stroke-width="0.5" stroke-dasharray="2,2"/>
      <circle cx="210" cy="200" r="1.8" fill="#c084fc"/>
      <text x="210" y="222" text-anchor="middle" fill="rgba(192,132,252,0.6)" font-size="9" font-family="PingFang SC">Codex 293</text>

      <circle cx="310" cy="210" r="8" fill="rgba(94,234,212,0.06)" stroke="rgba(94,234,212,0.15)" stroke-width="0.5" stroke-dasharray="2,2"/>
      <circle cx="310" cy="210" r="1.2" fill="#5eead4"/>
      <text x="310" y="227" text-anchor="middle" fill="rgba(94,234,212,0.5)" font-size="9" font-family="PingFang SC">Claude 65</text>
    </svg>

    <!-- 观测数据 -->
    <div style="display: flex; justify-content: space-between; margin-bottom: 24px; padding: 12px 0; border-top: 1px solid rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.05);">
      <div style="text-align: center;">
        <div style="font-size: 22px; font-weight: 300; color: rgba(255,255,255,0.85);">713</div>
        <div style="font-size: 9px; color: rgba(255,255,255,0.2); margin-top: 2px;">总观测数</div>
      </div>
      <div style="text-align: center;">
        <div style="font-size: 22px; font-weight: 300; color: rgba(255,255,255,0.85);">102</div>
        <div style="font-size: 9px; color: rgba(255,255,255,0.2); margin-top: 2px;">日均亮度</div>
      </div>
      <div style="text-align: center;">
        <div style="font-size: 22px; font-weight: 300; color: rgba(253,224,71,0.8);">166</div>
        <div style="font-size: 9px; color: rgba(255,255,255,0.2); margin-top: 2px;">峰值星等</div>
      </div>
      <div style="text-align: center;">
        <div style="font-size: 22px; font-weight: 300; color: rgba(255,255,255,0.85);">22h</div>
        <div style="font-size: 9px; color: rgba(255,255,255,0.2); margin-top: 2px;">最佳观测</div>
      </div>
    </div>

    <!-- 金句 -->
    <div style="text-align: center;">
      <div style="font-size: 14px; color: rgba(255,255,255,0.4); line-height: 1.7; font-weight: 300;">
        「我们都在阴沟里，<br/>但仍有人在仰望星空。」
      </div>
      <div style="font-size: 10px; color: rgba(255,255,255,0.12); margin-top: 8px;">—— 奥斯卡·王尔德</div>
    </div>
  </div>
</div>
</body>
</html>
