<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 390px; height: 520px; overflow: hidden; }
</style>
</head>
<body>
<div style="font-family: -apple-system, 'SF Pro Display', 'PingFang SC', sans-serif; max-width: 400px; margin: 0 auto; background: #dc2626; border-radius: 16px; padding: 6px; box-shadow: 0 4px 20px rgba(220,38,38,0.3);">
  <h2 class="sr-only">精灵图鉴风格 AI 对话统计卡片</h2>

  <!-- 上半部分 -->
  <div style="background: #b91c1c; border-radius: 12px 12px 0 0; padding: 12px 16px;">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <div style="display: flex; gap: 6px; align-items: center;">
        <div style="width: 20px; height: 20px; border-radius: 50%; background: radial-gradient(circle at 35% 35%, #93c5fd, #2563eb); border: 2px solid #1e3a5f; box-shadow: 0 0 6px rgba(37,99,235,0.4);"></div>
        <div style="width: 8px; height: 8px; border-radius: 50%; background: #ef4444;"></div>
        <div style="width: 8px; height: 8px; border-radius: 50%; background: #fbbf24;"></div>
        <div style="width: 8px; height: 8px; border-radius: 50%; background: #22c55e;"></div>
      </div>
      <span style="font-size: 10px; color: rgba(255,255,255,0.5); letter-spacing: 1px;">HAI-DEX v2.6</span>
    </div>
  </div>

  <!-- 屏幕区 -->
  <div style="background: #991b1b; padding: 8px 16px 16px;">
    <div style="background: #1a2e1a; border-radius: 8px; border: 3px solid #555; padding: 16px; position: relative; overflow: hidden;">
      <!-- 扫描线 -->
      <div style="position: absolute; inset: 0; background: repeating-linear-gradient(0deg, transparent 0, transparent 2px, rgba(34,197,94,0.03) 2px, rgba(34,197,94,0.03) 4px); pointer-events: none;"></div>

      <div style="position: relative; z-index: 1;">
        <!-- 精灵名 + 编号 -->
        <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px;">
          <div>
            <div style="font-size: 20px; font-weight: 800; color: #4ade80;">曲直</div>
            <div style="font-size: 10px; color: #166534;">对话训练师</div>
          </div>
          <div style="font-size: 14px; color: #166534; font-weight: 700;">No.0626</div>
        </div>

        <!-- 属性标签 -->
        <div style="display: flex; gap: 6px; margin-bottom: 14px;">
          <span style="background: #3b82f6; color: #fff; font-size: 10px; padding: 2px 10px; border-radius: 10px; font-weight: 600;">飞书系</span>
          <span style="background: #a855f7; color: #fff; font-size: 10px; padding: 2px 10px; border-radius: 10px; font-weight: 600;">代码系</span>
          <span style="background: #22c55e; color: #fff; font-size: 10px; padding: 2px 10px; border-radius: 10px; font-weight: 600;">对话系</span>
        </div>

        <!-- 数据 -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px;">
          <div style="background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.15); border-radius: 6px; padding: 8px; text-align: center;">
            <div style="font-size: 8px; color: #166534;">总对话量</div>
            <div style="font-size: 26px; font-weight: 800; color: #4ade80;">713</div>
          </div>
          <div style="background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.15); border-radius: 6px; padding: 8px; text-align: center;">
            <div style="font-size: 8px; color: #166534;">日均战力</div>
            <div style="font-size: 26px; font-weight: 800; color: #4ade80;">102</div>
          </div>
        </div>

        <!-- 能力值六边形（简化为条形） -->
        <div style="margin-bottom: 14px;">
          <div style="font-size: 9px; color: #166534; margin-bottom: 6px; letter-spacing: 1px;">能力值</div>
          <div style="display: flex; flex-direction: column; gap: 4px;">
            <div style="display: flex; align-items: center; gap: 6px;">
              <span style="font-size: 10px; color: #4ade80; width: 50px; text-align: right;">飞书</span>
              <div style="flex: 1; height: 8px; background: rgba(34,197,94,0.1); border-radius: 4px; overflow: hidden;">
                <div style="width: 100%; height: 100%; background: linear-gradient(90deg, #22c55e, #4ade80); border-radius: 4px;"></div>
              </div>
              <span style="font-size: 10px; color: #4ade80; width: 30px;">355</span>
            </div>
            <div style="display: flex; align-items: center; gap: 6px;">
              <span style="font-size: 10px; color: #4ade80; width: 50px; text-align: right;">Codex</span>
              <div style="flex: 1; height: 8px; background: rgba(34,197,94,0.1); border-radius: 4px; overflow: hidden;">
                <div style="width: 82.5%; height: 100%; background: linear-gradient(90deg, #22c55e, #4ade80); border-radius: 4px;"></div>
              </div>
              <span style="font-size: 10px; color: #4ade80; width: 30px;">293</span>
            </div>
            <div style="display: flex; align-items: center; gap: 6px;">
              <span style="font-size: 10px; color: #4ade80; width: 50px; text-align: right;">Claude</span>
              <div style="flex: 1; height: 8px; background: rgba(34,197,94,0.1); border-radius: 4px; overflow: hidden;">
                <div style="width: 18.3%; height: 100%; background: linear-gradient(90deg, #22c55e, #4ade80); border-radius: 4px;"></div>
              </div>
              <span style="font-size: 10px; color: #4ade80; width: 30px;">65</span>
            </div>
          </div>
        </div>

        <!-- 图鉴说明 -->
        <div style="border-top: 1px solid rgba(34,197,94,0.15); padding-top: 10px;">
          <div style="font-size: 11px; color: #4ade80; line-height: 1.7;">
            栖息地：深圳 · 深夜工作室<br/>
            特性：夜行性，每晚 22 时活跃度最高<br/>
            稀有度：<span style="color: #fbbf24;">★★★★★</span> 传说级
          </div>
        </div>

        <!-- 金句 -->
        <div style="margin-top: 10px; padding-top: 8px; border-top: 1px solid rgba(34,197,94,0.15);">
          <div style="font-size: 11px; color: #166534; line-height: 1.6; text-align: center; font-style: italic;">
            「成为最强训练师的路上，<br/>每一轮对话都是一颗精灵球。」
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 底部按钮区 -->
  <div style="background: #b91c1c; border-radius: 0 0 12px 12px; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center;">
    <div style="display: flex; gap: 8px;">
      <div style="width: 28px; height: 12px; background: #991b1b; border-radius: 6px;"></div>
      <div style="width: 28px; height: 12px; background: #991b1b; border-radius: 6px;"></div>
    </div>
    <div style="width: 40px; height: 40px; background: #991b1b; border-radius: 50%; border: 2px solid #7f1d1d; display: flex; align-items: center; justify-content: center;">
      <div style="width: 12px; height: 12px; border-radius: 50%; background: #ef4444;"></div>
    </div>
    <div style="display: flex; gap: 4px;">
      <div style="width: 12px; height: 12px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 4px #22c55e;"></div>
      <div style="width: 12px; height: 12px; background: #ef4444; border-radius: 50%; box-shadow: 0 0 4px #ef4444;"></div>
    </div>
  </div>
</div>
</body>
</html>
