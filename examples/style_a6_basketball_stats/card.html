<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 390px; height: 520px; overflow: hidden; }
</style>
</head>
<body>
<div style="font-family: -apple-system, 'SF Pro Display', 'PingFang SC', sans-serif; max-width: 440px; margin: 0 auto; background: #111; border-radius: 12px; overflow: hidden; border: 1px solid #333;">
  <h2 class="sr-only">NBA球员技术统计风格 AI 对话统计卡片</h2>

  <!-- 联盟LOGO条 -->
  <div style="background: linear-gradient(90deg, #1d428a 50%, #c8102e 50%); height: 4px;"></div>

  <div style="padding: 20px;">
    <!-- 球员卡头部 -->
    <div style="display: flex; gap: 16px; margin-bottom: 20px;">
      <!-- 球衣号 -->
      <div style="width: 80px; height: 100px; background: linear-gradient(180deg, #1d428a, #0a1a3a); border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0;">
        <div style="font-size: 40px; font-weight: 900; color: #fff; line-height: 1;">#26</div>
        <div style="font-size: 9px; color: rgba(255,255,255,0.4); margin-top: 2px; letter-spacing: 1px;">WEEK</div>
      </div>
      <div style="flex: 1;">
        <div style="font-size: 9px; color: #c8102e; font-weight: 700; letter-spacing: 1px; margin-bottom: 2px;">HAI LEAGUE · 人机联赛</div>
        <div style="font-size: 24px; font-weight: 800; color: #fff; margin-bottom: 4px;">曲直</div>
        <div style="font-size: 11px; color: #888;">深圳 AI 勇士队 · 控球后卫</div>
        <div style="display: flex; gap: 12px; margin-top: 8px;">
          <div style="font-size: 10px; color: #555;">身高：<span style="color: #999;">713轮级</span></div>
          <div style="font-size: 10px; color: #555;">体重：<span style="color: #999;">日均102</span></div>
        </div>
      </div>
    </div>

    <!-- 赛季数据 -->
    <div style="background: #1a1a1a; border-radius: 10px; padding: 16px; margin-bottom: 14px;">
      <div style="font-size: 10px; color: #c8102e; font-weight: 700; letter-spacing: 2px; margin-bottom: 12px;">本周技术统计</div>
      <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; text-align: center;">
        <div>
          <div style="font-size: 28px; font-weight: 800; color: #fff;">713</div>
          <div style="font-size: 9px; color: #666;">总得分</div>
        </div>
        <div>
          <div style="font-size: 28px; font-weight: 800; color: #fff;">102</div>
          <div style="font-size: 9px; color: #666;">场均</div>
        </div>
        <div>
          <div style="font-size: 28px; font-weight: 800; color: #c8102e;">166</div>
          <div style="font-size: 9px; color: #666;">单场最高</div>
        </div>
        <div>
          <div style="font-size: 28px; font-weight: 800; color: #fff;">7</div>
          <div style="font-size: 9px; color: #666;">出场</div>
        </div>
      </div>
    </div>

    <!-- 分项数据 -->
    <div style="background: #1a1a1a; border-radius: 10px; padding: 16px; margin-bottom: 14px;">
      <div style="font-size: 10px; color: #666; letter-spacing: 1px; margin-bottom: 10px;">得分分布</div>
      <div style="margin-bottom: 10px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
          <span style="font-size: 11px; color: #999;">飞书三分球</span>
          <span style="font-size: 13px; color: #fff; font-weight: 700;">355</span>
        </div>
        <div style="height: 6px; background: #222; border-radius: 3px; overflow: hidden;">
          <div style="width: 49.8%; height: 100%; background: #1d428a; border-radius: 3px;"></div>
        </div>
      </div>
      <div style="margin-bottom: 10px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
          <span style="font-size: 11px; color: #999;">Codex 中距离</span>
          <span style="font-size: 13px; color: #fff; font-weight: 700;">293</span>
        </div>
        <div style="height: 6px; background: #222; border-radius: 3px; overflow: hidden;">
          <div style="width: 41.1%; height: 100%; background: #c8102e; border-radius: 3px;"></div>
        </div>
      </div>
      <div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
          <span style="font-size: 11px; color: #999;">Claude 罚球</span>
          <span style="font-size: 13px; color: #fff; font-weight: 700;">65</span>
        </div>
        <div style="height: 6px; background: #222; border-radius: 3px; overflow: hidden;">
          <div style="width: 9.1%; height: 100%; background: #888; border-radius: 3px;"></div>
        </div>
      </div>
    </div>

    <!-- 逐场得分 -->
    <div style="background: #1a1a1a; border-radius: 10px; padding: 16px; margin-bottom: 14px;">
      <div style="font-size: 10px; color: #666; letter-spacing: 1px; margin-bottom: 10px;">逐场得分曲线</div>
      <div style="display: flex; align-items: flex-end; gap: 6px; height: 50px;">
        <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%;">
          <div style="width:100%; background:#1d428a; border-radius:3px 3px 0 0; height:54.8%;"></div>
          <div style="font-size:8px; color:#555; margin-top:3px;">G1</div>
        </div>
        <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%;">
          <div style="width:100%; background:#1d428a; border-radius:3px 3px 0 0; height:65.7%;"></div>
          <div style="font-size:8px; color:#555; margin-top:3px;">G2</div>
        </div>
        <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%;">
          <div style="width:100%; background:#1d428a; border-radius:3px 3px 0 0; height:58.4%;"></div>
          <div style="font-size:8px; color:#555; margin-top:3px;">G3</div>
        </div>
        <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%;">
          <div style="width:100%; background:#c8102e; border-radius:3px 3px 0 0; height:100%; box-shadow: 0 0 8px rgba(200,16,46,0.3);"></div>
          <div style="font-size:8px; color:#c8102e; margin-top:3px; font-weight:700;">G4★</div>
        </div>
        <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%;">
          <div style="width:100%; background:#1d428a; border-radius:3px 3px 0 0; height:80.1%;"></div>
          <div style="font-size:8px; color:#555; margin-top:3px;">G5</div>
        </div>
        <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%;">
          <div style="width:100%; background:#1d428a; border-radius:3px 3px 0 0; height:47%;"></div>
          <div style="font-size:8px; color:#555; margin-top:3px;">G6</div>
        </div>
        <div style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%;">
          <div style="width:100%; background:#333; border-radius:3px 3px 0 0; height:23.5%;"></div>
          <div style="font-size:8px; color:#444; margin-top:3px;">G7</div>
        </div>
      </div>
    </div>

    <!-- 金句 -->
    <div style="text-align: center; padding-top: 8px;">
      <div style="font-size: 12px; color: #666; line-height: 1.6; font-style: italic;">
        「我可以接受失败，但不能接受不提问。」
      </div>
      <div style="font-size: 10px; color: #333; margin-top: 4px;">—— 迈克尔·乔丹 · 曲直改编</div>
    </div>
  </div>

  <!-- 底部红蓝条 -->
  <div style="background: linear-gradient(90deg, #1d428a 50%, #c8102e 50%); height: 4px;"></div>
</div>
</body>
</html>
