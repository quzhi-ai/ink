<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 390px; height: 520px; overflow: hidden; }
</style>
</head>
<body>
<div style="font-family: -apple-system, 'SF Pro Display', 'PingFang SC', sans-serif; max-width: 360px; margin: 0 auto; background: #000; border-radius: 4px; overflow: hidden; position: relative; aspect-ratio: 2/3;">
  <h2 class="sr-only">电影海报风格 AI 对话统计卡片</h2>

  <!-- 背景氛围 -->
  <div style="position: absolute; inset: 0; background: linear-gradient(180deg, #0a0a1a 0%, #111 30%, #0a0a0a 60%, #000 100%);"></div>
  <div style="position: absolute; top: 20%; left: 50%; transform: translateX(-50%); width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(200,168,78,0.06) 0%, transparent 60%); pointer-events: none;"></div>

  <div style="position: relative; z-index: 1; height: 100%; display: flex; flex-direction: column; padding: 32px 24px 24px;">

    <!-- 上映信息 -->
    <div style="text-align: center; margin-bottom: auto;">
      <div style="font-size: 9px; color: rgba(255,255,255,0.2); letter-spacing: 3px;">人机联邦影业 出品</div>
    </div>

    <!-- 中央大字 -->
    <div style="text-align: center; margin: auto 0;">
      <div style="font-size: 120px; font-weight: 900; color: #fff; line-height: 0.85; letter-spacing: -4px; text-shadow: 0 0 60px rgba(200,168,78,0.15);">713</div>
      <div style="height: 2px; width: 60px; background: #c8a84e; margin: 16px auto;"></div>
      <div style="font-size: 13px; color: rgba(255,255,255,0.4); letter-spacing: 6px; margin-bottom: 8px;">轮 对 话</div>
      <div style="font-size: 22px; font-weight: 300; color: rgba(255,255,255,0.7); letter-spacing: 4px;">七日人机交响</div>
    </div>

    <!-- 演职表 -->
    <div style="margin: auto 0 0; text-align: center;">
      <!-- 主演 -->
      <div style="margin-bottom: 16px;">
        <div style="font-size: 9px; color: rgba(200,168,78,0.4); letter-spacing: 2px; margin-bottom: 6px;">主　演</div>
        <div style="font-size: 18px; font-weight: 600; color: #fff; letter-spacing: 4px;">曲　直</div>
      </div>

      <!-- 联合出演 -->
      <div style="display: flex; justify-content: center; gap: 24px; margin-bottom: 20px; font-size: 11px;">
        <div>
          <div style="color: rgba(255,255,255,0.6);">飞书</div>
          <div style="color: rgba(200,168,78,0.6); font-size: 9px;">355 场</div>
        </div>
        <div style="color: rgba(255,255,255,0.1);">|</div>
        <div>
          <div style="color: rgba(255,255,255,0.6);">Codex</div>
          <div style="color: rgba(200,168,78,0.6); font-size: 9px;">293 场</div>
        </div>
        <div style="color: rgba(255,255,255,0.1);">|</div>
        <div>
          <div style="color: rgba(255,255,255,0.6);">Claude</div>
          <div style="color: rgba(200,168,78,0.6); font-size: 9px;">65 场</div>
        </div>
      </div>

      <!-- 口碑 -->
      <div style="display: flex; justify-content: center; gap: 20px; margin-bottom: 16px; padding: 10px 0; border-top: 1px solid rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.05);">
        <div style="text-align: center;">
          <div style="font-size: 18px; font-weight: 700; color: #c8a84e;">9.7</div>
          <div style="font-size: 8px; color: rgba(255,255,255,0.2);">豆瓣评分</div>
        </div>
        <div style="text-align: center;">
          <div style="font-size: 18px; font-weight: 700; color: #c8a84e;">166</div>
          <div style="font-size: 8px; color: rgba(255,255,255,0.2);">单日票房峰值</div>
        </div>
        <div style="text-align: center;">
          <div style="font-size: 18px; font-weight: 700; color: #c8a84e;">22h</div>
          <div style="font-size: 8px; color: rgba(255,255,255,0.2);">午夜场</div>
        </div>
      </div>

      <!-- 金句 slogan -->
      <div style="font-size: 13px; color: rgba(255,255,255,0.35); font-style: italic; line-height: 1.6; margin-bottom: 12px;">
        「每一个问题都是一张电影票，<br/>通往一个你还不知道的世界。」
      </div>

      <!-- 上映日 -->
      <div style="font-size: 9px; color: rgba(255,255,255,0.15); letter-spacing: 3px;">
        6月20日 — 6月26日 · 全国公映
      </div>
    </div>
  </div>
</div>
</body>
</html>
