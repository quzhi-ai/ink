<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 390px; height: 520px; overflow: hidden; }
</style>
</head>
<body>
<div style="font-family: -apple-system, 'SF Pro Display', 'PingFang SC', sans-serif; max-width: 380px; margin: 0 auto; background: linear-gradient(180deg, #2a4a3e 0%, #121212 40%); border-radius: 12px; overflow: hidden;">
  <h2 class="sr-only">音乐播放器风格 AI 对话统计卡片</h2>

  <div style="padding: 20px 20px 16px;">
    <!-- 专辑封面 -->
    <div style="width: 100%; aspect-ratio: 1; background: linear-gradient(135deg, #1a3a2e 0%, #0a1a12 40%, #2a4a3e 100%); border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 20px; position: relative; overflow: hidden;">
      <div style="position: absolute; inset: 0; background: radial-gradient(circle at 30% 40%, rgba(29,185,84,0.08) 0%, transparent 50%);"></div>
      <!-- 声波可视化 -->
      <div style="display: flex; align-items: center; gap: 4px; height: 100px; margin-bottom: 16px; position: relative; z-index: 1;">
        <div style="width: 6px; border-radius: 3px; background: #1db954; height: 54.8%; opacity: 0.7;"></div>
        <div style="width: 6px; border-radius: 3px; background: #1db954; height: 65.7%; opacity: 0.75;"></div>
        <div style="width: 6px; border-radius: 3px; background: #1db954; height: 58.4%; opacity: 0.7;"></div>
        <div style="width: 6px; border-radius: 3px; background: #1db954; height: 100%;"></div>
        <div style="width: 6px; border-radius: 3px; background: #1db954; height: 80.1%; opacity: 0.8;"></div>
        <div style="width: 6px; border-radius: 3px; background: #1db954; height: 47%; opacity: 0.6;"></div>
        <div style="width: 6px; border-radius: 3px; background: #1db954; height: 23.5%; opacity: 0.35;"></div>
      </div>
      <div style="font-size: 56px; font-weight: 900; color: #fff; line-height: 1; position: relative; z-index: 1;">713</div>
      <div style="font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 4px; position: relative; z-index: 1; letter-spacing: 2px;">轮 对 话</div>
    </div>

    <!-- 歌曲信息 -->
    <div style="margin-bottom: 16px;">
      <div style="font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 2px;">第二十六周协奏曲</div>
      <div style="font-size: 13px; color: #b3b3b3;">曲直 · 2026 周报专辑</div>
    </div>

    <!-- 进度条 -->
    <div style="margin-bottom: 8px;">
      <div style="height: 4px; background: #4d4d4d; border-radius: 2px; overflow: hidden; position: relative;">
        <div style="width: 71.3%; height: 100%; background: #1db954; border-radius: 2px;"></div>
        <div style="width: 8px; height: 8px; border-radius: 50%; background: #fff; position: absolute; top: -2px; left: 71.3%; transform: translateX(-50%);"></div>
      </div>
      <div style="display: flex; justify-content: space-between; margin-top: 4px;">
        <span style="font-size: 10px; color: #b3b3b3;">第5天</span>
        <span style="font-size: 10px; color: #b3b3b3;">7天</span>
      </div>
    </div>

    <!-- 播放控制 -->
    <div style="display: flex; align-items: center; justify-content: center; gap: 24px; margin-bottom: 20px;">
      <span style="font-size: 16px; color: #b3b3b3;">⟨⟨</span>
      <div style="width: 48px; height: 48px; border-radius: 50%; background: #1db954; display: flex; align-items: center; justify-content: center;">
        <span style="font-size: 20px; color: #000; margin-left: 3px;">▶</span>
      </div>
      <span style="font-size: 16px; color: #b3b3b3;">⟩⟩</span>
    </div>

    <!-- 曲目列表 -->
    <div style="background: rgba(255,255,255,0.05); border-radius: 8px; padding: 12px;">
      <div style="font-size: 10px; color: #b3b3b3; margin-bottom: 8px; letter-spacing: 1px;">曲 目 列 表</div>
      <div style="font-size: 12px; color: #fff; line-height: 2.4;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <div><span style="color: #1db954; margin-right: 8px; font-size: 10px;">♫</span>飞书 AI 教练</div>
          <span style="color: #b3b3b3; font-size: 11px;">355 拍</span>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <div><span style="color: #b3b3b3; margin-right: 8px; font-size: 10px;">♪</span>Codex 编程</div>
          <span style="color: #b3b3b3; font-size: 11px;">293 拍</span>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <div><span style="color: #b3b3b3; margin-right: 8px; font-size: 10px;">♪</span>Claude 桌面</div>
          <span style="color: #b3b3b3; font-size: 11px;">65 拍</span>
        </div>
      </div>
    </div>

    <!-- 金句 -->
    <div style="text-align: center; margin-top: 16px; padding-top: 12px; border-top: 1px solid rgba(255,255,255,0.05);">
      <div style="font-size: 12px; color: #b3b3b3; line-height: 1.6; font-style: italic;">
        「没有音乐的一天是虚度的。<br/>没有对话的一天也是。」
      </div>
      <div style="font-size: 10px; color: #4d4d4d; margin-top: 4px;">—— 尼采 · 曲直改编</div>
    </div>
  </div>
</div>
</body>
</html>
